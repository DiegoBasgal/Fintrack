{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <div class="card shadow-lg border-0 p-4 login-card" data-aos="zoom-in">

            <h2 class="text-center mb-4">
                🔐 Login
            </h2>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Digite seu usuário"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <button class="btn btn-primary w-100">
                    Entrar
                </button>
            </form>

        </div>

    </div>
</div>

{% endblock %}
