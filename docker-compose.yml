services:
  db:
    image: postgres:17
    container_name: fintrack_db
    restart: always
    environment:
      POSTGRES_DB: fintrack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PostMaster99
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: fintrack_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: fintrack_db
      DB_USER: postgres
      DB_PASSWORD: PostMaster99
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data: